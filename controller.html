<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0b0b0f">
    <title>Quintasch — Controller</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.5/dist/peerjs.min.js"></script>
    <style>
        /* Spezifische Controller-Anpassungen für Mobile-First */
        .controller-wrapper {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
            gap: 20px;
        }
        
        .loading-pulse {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: transparent;
            border: 3px solid var(--neon-cyan);
            box-shadow: var(--glow-cyan);
            margin: 20px auto;
            animation: pulse-ring 1.5s infinite ease-in-out;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.1);
                opacity: 1;
                box-shadow: 0 0 20px var(--neon-cyan);
            }
            100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
        }

        .lobby-players {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .lobby-player-badge {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid var(--neon-cyan);
            border-radius: 8px;
            padding: 12px 16px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: #fff;
            text-shadow: var(--glow-cyan);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lobby-player-badge::after {
            content: "BEREIT";
            font-size: 0.8rem;
            color: var(--neon-green);
            text-shadow: var(--glow-green);
        }

        .status-error {
            color: var(--neon-magenta) !important;
            text-shadow: var(--glow-magenta) !important;
        }

        /* Styling für stilisierte Würfelaugen am Handy */
        .mobile-die {
            width: 45px;
            height: 45px;
            background: rgba(15, 15, 22, 0.9);
            border: 2px solid var(--neon-cyan);
            box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.2), 0 0 5px rgba(0, 240, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px var(--neon-cyan);
        }

        .mobile-die.even {
            border-color: var(--neon-magenta);
            box-shadow: inset 0 0 10px rgba(255, 0, 127, 0.2), 0 0 5px rgba(255, 0, 127, 0.2);
            text-shadow: 0 0 5px #fff, 0 0 10px var(--neon-magenta);
        }
    </style>
</head>
<body>
    <div class="controller-wrapper">
        <header class="header">
            <h1 style="font-size: 2.2rem; letter-spacing: 2px;">Quintasch</h1>
            <p style="font-size: 0.95rem;">Smartphone Controller</p>
        </header>

        <!-- BEITRITTS-BEREICH -->
        <main class="panel" id="join-container">
            <h2 class="sidebar-title" style="font-size: 1.2rem; margin-bottom: 20px; border: none;">Spiel beitreten</h2>
            
            <div id="join-error-msg" class="status-error" style="font-size: 0.95rem; margin-bottom: 15px; display: none;"></div>

            <div class="form-group">
                <label for="client-player-name">Dein Name</label>
                <input type="text" id="client-player-name" class="form-control" placeholder="z. B. Max" maxlength="12">
            </div>

            <button class="btn-neon" id="join-button">Beitreten</button>

            <div id="settings-panel" style="display: none; width: 100%; border-top: 1px solid rgba(0, 240, 255, 0.15); padding-top: 15px; margin-top: 15px; text-align: left;">
                <h4 style="margin: 0 0 10px 0; color: var(--neon-magenta); font-family: 'Orbitron', sans-serif; font-size: 0.95rem;">Peer-Server Einstellungen</h4>
                <div class="form-group" style="margin-bottom: 10px;">
                    <label for="peer-host" style="font-size: 0.8rem;">Host</label>
                    <input type="text" id="peer-host" class="form-control" placeholder="0.peerjs.com" style="padding: 6px 12px; font-size: 0.95rem; width: 100%;">
                </div>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                        <label for="peer-port" style="font-size: 0.8rem;">Port</label>
                        <input type="number" id="peer-port" class="form-control" placeholder="443" style="padding: 6px 12px; font-size: 0.95rem; width: 100%;">
                    </div>
                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                        <label for="peer-path" style="font-size: 0.8rem;">Pfad</label>
                        <input type="text" id="peer-path" class="form-control" placeholder="/" style="padding: 6px 12px; font-size: 0.95rem; width: 100%;">
                    </div>
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
                    <input type="checkbox" id="peer-secure" checked>
                    <label for="peer-secure" style="margin-bottom: 0; font-size: 0.85rem;">Sicher (SSL/HTTPS)</label>
                </div>
                <h4 style="margin: 15px 0 10px 0; color: var(--neon-magenta); font-family: 'Orbitron', sans-serif; font-size: 0.95rem; border-top: 1px solid rgba(0, 240, 255, 0.1); padding-top: 10px;">Audio Einstellungen</h4>
                <div class="form-group" style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
                    <input type="checkbox" id="client-sound-toggle" checked>
                    <label for="client-sound-toggle" style="margin-bottom: 0; font-size: 0.85rem;">Rassel-Sound abspielen</label>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button class="btn-neon" id="save-settings-button" style="padding: 5px 10px; font-size: 0.8rem; flex: 1; min-height: auto;">Speichern</button>
                    <button class="btn-neon" id="reset-settings-button" style="padding: 5px 10px; font-size: 0.8rem; flex: 1; min-height: auto; --neon-cyan: var(--neon-magenta);">Reset</button>
                </div>
            </div>
            <button id="toggle-settings-button" style="background: none; border: none; color: var(--text-muted); cursor: pointer; text-decoration: underline; font-size: 0.85rem; margin-top: 15px; width: 100%; text-align: center;">Server-Einstellungen anzeigen</button>
        </main>

        <!-- LOBBY-WARTERAUM -->
        <main class="panel" id="lobby-container" style="display: none; text-align: center;">
            <h2 class="sidebar-title" id="lobby-status-title" style="font-size: 1.2rem; margin-bottom: 15px; border: none;">Verbinde zum Raum...</h2>
            
            <div class="loading-pulse" id="lobby-spinner"></div>
            <div id="lobby-wait-text" style="font-size: 1.1rem; color: var(--text-muted); margin-bottom: 15px;">Warte in Lobby...</div>
        </main>

        <!-- GAMEPLAY-AKTIONSBEREICH -->
        <main class="panel" id="gameplay-container" style="display: none; text-align: center;">
            <h2 class="sidebar-title" id="gameplay-status-title" style="font-size: 1.5rem; margin-bottom: 20px; border: none; color: var(--neon-green); text-shadow: var(--glow-green);">Du bist dran!</h2>
            
            <div id="gameplay-form-wrapper">
                <!-- Pause/Aussetzen Schalter -->
                <div class="form-group" style="display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255, 0, 127, 0.15); padding-bottom: 10px; margin-bottom: 15px;">
                    <label for="client-pause-toggle" style="margin-bottom: 0; font-family: 'Orbitron', sans-serif; font-size: 0.95rem; color: var(--neon-yellow); text-shadow: 0 0 5px rgba(255, 230, 0, 0.2);">Aussetzen (Runde überspringen)</label>
                    <input type="checkbox" id="client-pause-toggle" style="width: 20px; height: 20px; cursor: pointer; accent-color: var(--neon-yellow);">
                </div>

                <div class="form-group" style="text-align: left;">
                    <label for="gameplay-bet">Dein Wetteinsatz</label>
                    <select id="gameplay-bet" class="form-control">
                        <option value="pasch">Pasch</option>
                        <option value="doppelpasch">Doppelpasch</option>
                        <option value="trasch">Trasch</option>
                        <option value="fullhouse">Full House</option>
                        <option value="strasse">Straße</option>
                        <option value="quadrasch">Quadrasch</option>
                        <option value="quintasch">Quintasch</option>
                    </select>
                </div>

                <div class="form-group" style="text-align: left; margin-top: 15px;">
                    <label for="gameplay-stake">Dein Einsatz</label>
                    <select id="gameplay-stake" class="form-control">
                        <option value="standard">Standard-Strafe</option>
                        <option value="1 Schluck">1 Schluck</option>
                        <option value="2 Schlucke">2 Schlucke</option>
                        <option value="3 Schlucke">3 Schlucke</option>
                        <option value="4 Schlucke">4 Schlucke</option>
                        <option value="5 Schlucke">5 Schlucke</option>
                        <option value="1 Shot">1 Shot</option>
                        <option value="2 Shots">2 Shots</option>
                        <option value="custom">Eigener...</option>
                    </select>
                    <input type="text" id="gameplay-custom-stake" class="form-control" placeholder="z. B. 3 Schlucke auf Ex" style="display: none; margin-top: 10px;" maxlength="30">
                    <div id="gameplay-custom-timer-group" style="display: none; margin-top: 10px;">
                        <label for="gameplay-custom-timer" style="font-size: 0.8rem;">Timer (optional in Sekunden)</label>
                        <input type="number" id="gameplay-custom-timer" class="form-control" placeholder="z. B. 30" min="1" max="300" style="padding: 6px 12px; font-size: 0.95rem; width: 100%;">
                    </div>
                </div>
            </div>

            <!-- Spielfeld mit 5 3D-CSS-Würfeln auf dem Handy -->
            <section class="mobile-dice-table" id="mobile-dice-table" style="display: none;">
                <!-- Würfel 1 -->
                <div class="cube-container">
                    <div class="cube" id="mobile-dice-0">
                        <div class="face front">1</div>
                        <div class="face back">6</div>
                        <div class="face right">3</div>
                        <div class="face left">4</div>
                        <div class="face top">2</div>
                        <div class="face bottom">5</div>
                    </div>
                </div>
                <!-- Würfel 2 -->
                <div class="cube-container">
                    <div class="cube" id="mobile-dice-1">
                        <div class="face front">1</div>
                        <div class="face back">6</div>
                        <div class="face right">3</div>
                        <div class="face left">4</div>
                        <div class="face top">2</div>
                        <div class="face bottom">5</div>
                    </div>
                </div>
                <!-- Würfel 3 -->
                <div class="cube-container">
                    <div class="cube" id="mobile-dice-2">
                        <div class="face front">1</div>
                        <div class="face back">6</div>
                        <div class="face right">3</div>
                        <div class="face left">4</div>
                        <div class="face top">2</div>
                        <div class="face bottom">5</div>
                    </div>
                </div>
                <!-- Würfel 4 -->
                <div class="cube-container">
                    <div class="cube" id="mobile-dice-3">
                        <div class="face front">1</div>
                        <div class="face back">6</div>
                        <div class="face right">3</div>
                        <div class="face left">4</div>
                        <div class="face top">2</div>
                        <div class="face bottom">5</div>
                    </div>
                </div>
                <!-- Würfel 5 -->
                <div class="cube-container">
                    <div class="cube" id="mobile-dice-4">
                        <div class="face front">1</div>
                        <div class="face back">6</div>
                        <div class="face right">3</div>
                        <div class="face left">4</div>
                        <div class="face top">2</div>
                        <div class="face bottom">5</div>
                    </div>
                </div>
            </section>

            <button class="btn-neon" id="gameplay-roll-button" style="border-color: var(--neon-green); color: var(--neon-green); box-shadow: var(--glow-green); text-shadow: var(--glow-green); margin-top: 15px;">WÜRFELN!</button>
            
            <div style="margin-top: 25px; text-align: left; border-top: 1px solid rgba(0, 240, 255, 0.15); padding-top: 15px;">
                <h3 class="sidebar-title" style="font-size: 1rem; border: none; margin-bottom: 10px; color: var(--text-muted);">Spieler im Raum:</h3>
                <ul class="lobby-players" id="lobby-players-list">
                    <!-- Dynamische Spielerliste -->
                </ul>
            </div>
        </main>
    </div>

    <!-- WÜRFELERGEBNIS-OVERLAY -->
    <div id="roll-result-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 11, 15, 0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);">
        <div class="panel" style="width: 100%; max-width: 450px; text-align: center; border: 2px solid var(--neon-cyan); box-shadow: var(--glow-cyan); display: flex; flex-direction: column; gap: 15px; padding: 25px;">
            <h2 id="result-overlay-title" class="sidebar-title" style="font-size: 1.6rem; border: none; margin-bottom: 0;">Ergebnis</h2>
            
            <!-- Stilisierte Würfel-Boxen -->
            <div id="result-overlay-dice" style="display: flex; justify-content: center; gap: 10px; margin: 10px 0;">
                <!-- Dynamisch erzeugte Würfel-Kästchen -->
            </div>

            <div id="result-overlay-text" style="font-size: 1.1rem; color: #fff; line-height: 1.5; margin-bottom: 10px;">
                <!-- Detaillierter Ergebnistext -->
            </div>

            <button class="btn-neon" id="result-overlay-close-btn" style="--neon-cyan: var(--neon-magenta); border-color: var(--neon-magenta); color: var(--neon-magenta); box-shadow: var(--glow-magenta); text-shadow: var(--glow-magenta); margin-top: 10px; padding: 12px 20px; font-size: 1rem;">Schließen</button>
        </div>
    </div>

    <script type="module" src="js/controller.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registriert!', reg))
                    .catch(err => console.error('Service Worker Fehler:', err));
            });
        }
    </script>
</body>
</html>
